<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mohakerdi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0d1117;
    }
    .markdown-body {
      box-sizing: border-box;
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    @media (max-width: 767px) {
      .markdown-body { padding: 16px; }
    }
  </style>
</head>
<body>
  <article id="content" class="markdown-body">Loading…</article>
  <script>
    fetch('README.md', { cache: 'no-cache' })
      .then(function (r) {
        if (!r.ok) throw new Error('Failed to load README.md (' + r.status + ')');
        return r.text();
      })
      .then(function (md) {
        marked.setOptions({ gfm: true, breaks: false });
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(function (err) {
        document.getElementById('content').textContent = err.message;
      });
  </script>
</body>
</html>
